                            .replace(/\b(def|class|import|from|if|elif|else|for|while|try|except|finally|return|print|pass|break|continue|with|as|lambda|and|or|not|in|is|True|False|None)\b/g, '<span class="keyword">$1</span>')
                            // 字符串
                            .replace(/(['"])(?:\\.|[^\\])*?\1/g, '<span class="string">$&</span>')
                            // 注释
                            .replace(/#.*$/gm, '<span class="comment">$&</span>')
                            // 数字
                            .replace(/\b\d+\b/g, '<span class="number">$&</span>')
                            // 函数名
                            .replace(/\bdef\s+(\w+)/g, 'def <span class="function">$1</span>')
                            // 类名
                            .replace(/\bclass\s+(\w+)/g, 'class <span class="function">$1</span>')
                            // 运算符
                            .replace(/([=+\-*/%&|^!<>=])/g, '<span class="operator">$1</span>');
                    } else if (lang === 'javascript' || lang === 'js') {
                        return code
                            // 关键字
                            .replace(/\b(var|let|const|function|if|else|for|while|do|switch|case|default|break|continue|return|try|catch|finally|throw|new|this|typeof|instanceof|in|of|from|import|export|async|await)\b/g, '<span class="keyword">$1</span>')
                            // 字符串
                            .replace(/(['"])(?:\\.|[^\\])*?\1/g, '<span class="string">$&</span>')
                            // 注释
                            .replace(/\/\/.*$/gm, '<span class="comment">$&</span>')
                            .replace(/\/\*[\s\S]*?\*\//g, '<span class="comment">$&</span>')
                            // 数字
                            .replace(/\b\d+\b/g, '<span class="number">$&</span>')
                            // 函数名
                            .replace(/\bfunction\s+(\w+)/g, 'function <span class="function">$1</span>')
                            // 方法调用
                            .replace(/(\w+)\s*\(/g, '<span class="function">$1</span>(')
                            // 运算符
                            .replace(/([=+\-*/%&|^!<>=])/g, '<span class="operator">$1</span>');
                    } else if (lang === 'html') {
                        return code
                            // 标签
                            .replace(/<(\w+)/g, '<span class="keyword">&lt;$1</span>')
                            .replace(/<\/(\w+)>/g, '<span class="keyword">&lt;/$1&gt;</span>')
                            // 属性
                            .replace(/(\w+)\s*=/g, '<span class="function">$1</span>=')
                            // 属性值
                            .replace(/=(['"])(?:\\.|[^\\])*?\1/g, '=<span class="string">$&</span>')
                            // 注释
                            .replace(/<!--[\s\S]*?-->/g, '<span class="comment">$&</span>');
                    } else if (lang === 'css') {
                        return code
                            // 选择器
                            .replace(/([.#]?[\w-]+)\s*\{/g, '<span class="keyword">$1</span>{')
                            // 属性
                            .replace(/(\w+)\s*:/g, '<span class="function">$1</span>:')
                            // 值
                            .replace(/:\s*([^;]+);/g, ': <span class="string">$1</span>;')
                            // 注释
                            .replace(/\/\*[\s\S]*?\*\//g, '<span class="comment">$&</span>');
                    }
                    
                    return code;
                },
                langPrefix: 'language-'
            });
            
            const articleList = document.getElementById('articleList');
            if (!articleList) {
                console.error('articleList not found');
                return;
            }
            
            // 显示加载状态
            articleList.innerHTML = '<div style="text-align: center; padding: 40px;">加载中...</div>';
            
            // 直接获取文章数据
            fetch(`${API_URL}/articles/${id}`, {
                headers: getAuthHeaders()
            })
                .then(response => {
                    console.log('Response status:', response.status);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Article data:', data);
                    
                    // 显示文章
                    articleList.innerHTML = `
                        <div style="background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(148, 163, 184, 0.1); border-radius:20px;padding:36px;backdrop-filter: blur(10px);">
                            <button class="btn btn-secondary" onclick="loadArticles(); loadStats();" style="margin-bottom:24px;">← 返回列表</button>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:18px;">
                                <h1 style="font-size:32px;color:#f8fafc;margin:0;">${data.title}</h1>
                                <div style="display:flex;gap:12px;">
                                    <button class="btn btn-secondary" onclick="navigateArticle(${data.id}, 'prev')"><i class="fa fa-arrow-left"></i> 上一篇</button>
                                    <button class="btn btn-secondary" onclick="navigateArticle(${data.id}, 'next')">下一篇 <i class="fa fa-arrow-right"></i></button>
                                </div>
                            </div>
                            <div class="article-content" style="color:#cbd5e1;line-height:1.9;margin-bottom:36px;">
                                <!-- 内容将通过 JavaScript 插入 -->
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:24px;">
                                <div class="article-meta">
                                    <span class="article-category" style="background:#60a5fa;padding:4px 12px;border-radius:12px;font-size:12px;margin-right:12px;">${data.category}</span>
                                    <span style="color:#94a3b8;font-size:14px;margin-right:16px;">${new Date(data.updated_at).toLocaleString('zh-CN')}</span>
                                    <span style="color:#94a3b8;font-size:14px;"><i class="fa fa-eye"></i> ${data.views}</span>
                                </div>
                                <div style="display:flex;gap:12px;">
                                    <button class="btn btn-secondary" onclick="editArticle(${data.id})"><i class="fa fa-pencil"></i> 编辑</button>
                                    <button class="btn btn-secondary" onclick="toggleFavorite(${data.id}, event)"><i class="fa ${data.is_favorite ? 'fa-star' : 'fa-star-o'}"></i> ${data.is_favorite ? '取消收藏' : '收藏'}</button>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    // 插入解析后的 Markdown 内容
                    const articleContent = articleList.querySelector('.article-content');
                    articleContent.innerHTML = marked.parse(data.content);
                    
                    // 增加浏览次数
                    fetch(`${API_URL}/articles/${id}/view`, {
                        method: 'POST',
                        headers: getAuthHeaders()
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    articleList.innerHTML = `<div style="text-align: center; padding: 40px; color: red;">Error: ${error.message}</div>`;
                    if (error.message.includes('401')) {
                        // 未授权，重新检查认证状态
                        checkAuth();
                    }
                });
        }
    </script>
</body>
</html>
